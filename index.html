<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe de Throp</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f2ece0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }
  .container {
    width: 100%;
  }
  .thank-you {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 600;
    color: #2a1f14;
    line-height: 1.2;
    margin-bottom: 2rem;
    transform: rotate(-1.5deg);
    display: block;
    text-align: center;
  }
  .poster {
    width: 100%;
    max-width: min(75vh, 600px);
    height: auto;
    display: block;
    margin: 0 auto;
    border: 2px solid #b8a98e;
    transform: rotate(0.8deg);
    box-shadow: 4px 4px 0 #c4b49e;
  }
</style>
</head>
<body>
  <div class="container">
    <span class="thank-you">thank you for coming to my website ♡</span>
    <img src="poster.png" alt="Cafe de Throp" class="poster">
  </div>
</body>
</html>
